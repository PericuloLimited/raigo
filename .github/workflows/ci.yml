name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: cli/package-lock.json

    - name: Install dependencies
      working-directory: ./cli
      run: npm ci

    - name: Build
      working-directory: ./cli
      run: npm run build

    - name: Run tests
      working-directory: ./cli
      run: npm test --if-present

  validate-examples:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: cli/package-lock.json

    - name: Install dependencies
      working-directory: ./cli
      run: npm ci

    - name: Build CLI
      working-directory: ./cli
      run: npm run build

    - name: Validate healthcare example
      working-directory: ./cli
      run: node dist/index.js validate ../examples/healthcare.raigo

    - name: Validate defence example
      working-directory: ./cli
      run: node dist/index.js validate ../examples/defence.raigo

    - name: Validate startup example
      working-directory: ./cli
      run: node dist/index.js validate ../examples/startup.raigo
